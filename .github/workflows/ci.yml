name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

  validate-docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate documents
      run: |
        # Check that documents directory exists and has files
        if [ ! -d "data/raw" ]; then
          echo "Error: data/raw directory not found"
          exit 1
        fi

        # Count markdown files
        DOC_COUNT=$(find data/raw -name "*.md" -type f | wc -l)
        echo "Found $DOC_COUNT markdown documents"

        if [ "$DOC_COUNT" -lt 1 ]; then
          echo "Error: No documents found in data/raw"
          exit 1
        fi

        # Check for empty files
        EMPTY_FILES=$(find data/raw -name "*.md" -type f -empty)
        if [ -n "$EMPTY_FILES" ]; then
          echo "Warning: Empty files found: $EMPTY_FILES"
        fi

        echo "Document validation passed!"

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install flake8 black

    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting
      run: |
        black --check src/ || true
