name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

  validate-docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate documents
      run: |
        # Note: data/raw is in .gitignore, so docs won't be in the repo
        # This step just checks if the directory structure exists

        if [ ! -d "data" ]; then
          echo "Warning: data/ directory not found"
        fi

        if [ ! -d "data/raw" ]; then
          echo "Warning: data/raw/ directory not found (expected - files are in .gitignore)"
        fi

        if [ -d "data/raw" ]; then
          DOC_COUNT=$(find data/raw -name "*.md" -type f 2>/dev/null | wc -l)
          echo "Found $DOC_COUNT markdown documents in data/raw"
        fi

        echo "Document structure validation passed!"

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install flake8 black

    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting
      run: |
        black --check src/ || true
