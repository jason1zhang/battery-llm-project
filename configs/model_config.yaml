# Model Configuration
model:
  # Base model for generation
  generator_model:
    name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    device: "cuda"
    max_length: 2048
    temperature: 0.7
    top_p: 0.9
    top_k: 50

  # Embedding model for vector search
  embedding_model:
    name: "sentence-transformers/all-MiniLM-L6-v2"
    device: "cpu"
    dimension: 384
    batch_size: 32

  # Fine-tuning configuration
  finetune:
    base_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    lora:
      r: 8
      lora_alpha: 16
      lora_dropout: 0.05
      target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
    training:
      per_device_train_batch_size: 4
      gradient_accumulation_steps: 4
      learning_rate: 3e-4
      num_train_epochs: 3
      warmup_steps: 100
      logging_steps: 10
      save_steps: 500
      eval_steps: 500

  # Re-ranking model
  reranker_model:
    name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    device: "cpu"

# Vector database
vectorstore:
  type: "chroma"
  persist_directory: "./data/embeddings/chroma"
  collection_name: "langchain"
  distance_metric: "cosine"

# Data processing
data:
  raw_dir: "./data/raw"
  processed_dir: "./data/processed"
  chunk_size: 512
  chunk_overlap: 50
